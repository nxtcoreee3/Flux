<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flux - Play Unblocked Games</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Topbar -->
  <header class="topbar">
    <a href="index.html" class="logo">Flux</a>
    <nav class="nav">
      <ul class="nav-list">
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="#game-grid">Games</a></li> <!-- Added Games button -->
        <li><a href="info.html">Info</a></li>
        <li><a href="credits.html">Credits</a></li>
        <li><a href="donate.html">Donate</a></li>
      </ul>
    </nav>
    <div class="right-actions">
      <a class="icon-btn" href="https://github.com/nxtcoreee3/flux" target="_blank" rel="noopener">⭐ Star</a>
    </div>
  </header>

  <!-- Hero -->
  <section class="hero">
    <div>
      <h1>Welcome to Flux</h1>
      <p>Play your favorite unblocked games anywhere, anytime!</p>
      <div class="hero-actions">
        <a href="#game-grid" class="btn-large">Browse Games</a>
      </div>
    </div>
    <div class="hero-visual">
      <div class="tile tile-1"></div>
      <div class="tile tile-2"></div>
      <div class="tile tile-3"></div>
    </div>
  </section>

  <!-- Featured Games -->
  <section class="section featured">
    <div class="section-head">
      <h2>Featured</h2>
      <div class="search-wrap">
        <input id="quick-search" type="search" placeholder="Search games..." aria-label="Search games">
      </div>
    </div>

    <div id="game-grid" class="grid"></div>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-inner">
      <a href="index.html" class="logo-small">Flux</a>
      <div class="footer-links">
        <a href="https://tiktok.com/@nxtcoreee3" target="_blank">TikTok</a>
        <a href="https://instagram.com/nxtcoreee3" target="_blank">Instagram</a>
        <a href="https://github.com/nxtcoreee3" target="_blank">GitHub</a>
        <a href="https://ko-fi.com/nxtcoreee3" target="_blank">Ko-Fi</a>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
