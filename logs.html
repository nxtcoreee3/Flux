<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Activity Logs - Flux</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script>
    (function() {
      try {
        if (localStorage.getItem('flux_dark') === '1' ||
            (localStorage.getItem('flux_dark') === null && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
        if (localStorage.getItem('flux_beta') === '1') document.documentElement.classList.add('beta');
      } catch(e) {}
    })();
  </script>
  <style>
    body { background: var(--bg); color: var(--text); }
    .logs-page { max-width: 800px; margin: 40px auto; padding: 20px; }
    .logs-header { font-family: 'Bebas Neue', sans-serif; font-size: 42px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }

    .auth-container { text-align: center; margin-top: 100px; }
    .auth-title { font-family: 'Bebas Neue', sans-serif; font-size: 32px; margin-bottom: 10px; }
    .auth-btn { background: #3a7dff; color: white; border: none; padding: 12px 24px; border-radius: 30px; font-weight: 700; cursor: pointer; font-size: 16px; transition: background 0.2s; display: inline-flex; align-items: center; gap: 10px; }
    .auth-btn:hover { background: #2563eb; }
    .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .logs-container { background: var(--panel); border: 1px solid var(--glass-border); border-radius: 16px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
    .logs-toolbar { padding: 12px 20px; background: rgba(0,0,0,0.02); border-bottom: 1px solid var(--glass-border); display: flex; gap: 10px; align-items: center; justify-content: space-between; }

    .log-item { padding: 12px 20px; border-bottom: 1px solid var(--glass-border); display: flex; flex-direction: column; gap: 4px; }
    .log-item:last-child { border-bottom: none; }
    .log-user { font-weight: 700; color: var(--accent); }
    .log-action { color: var(--text); font-size: 14px; }
    .log-time { color: var(--muted); font-size: 11px; }

    select, button.tool-btn { padding: 6px 12px; border: 1px solid var(--glass-border); border-radius: 8px; font-size: 13px; background: var(--panel); color: var(--text); outline: none; font-family: inherit; }
    button.tool-btn { cursor: pointer; font-weight: 700; }
    button.tool-btn:hover { background: rgba(0,0,0,0.05); }

    .loading-msg { padding: 40px; text-align: center; color: var(--muted); }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <a href="index.html" class="logo"><img src="assets/logo.png" alt="Flux" style="height:32px;vertical-align:middle;margin-right:6px;"> FLUX</a>
    </div>
  </header>

  <main class="logs-page">

    <!-- Auth View -->
    <div id="auth-view" class="auth-container" style="display:none;">
      <h1 class="auth-title">Admin Authentication</h1>
      <p style="color:var(--muted); margin-bottom: 24px;">Sign in with your Google Admin account to access the logs.</p>
      <button id="google-signin-btn" class="auth-btn">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#fff" d="M9 3.48c1.69 0 2.83.73 3.48 1.34l2.54-2.48C13.46.89 11.43 0 9 0 5.48 0 2.44 2.02.96 4.96l2.91 2.26C4.6 5.05 6.62 3.48 9 3.48z"/><path fill="#fff" d="M17.64 9.2c0-.74-.06-1.28-.19-1.84H9v3.34h4.96c-.1.83-.64 2.08-1.84 2.92l2.84 2.2c1.7-1.57 2.68-3.88 2.68-6.62z"/><path fill="#fff" d="M3.88 10.78A5.54 5.54 0 0 1 3.58 9c0-.62.11-1.22.29-1.78L.96 4.96A9 9 0 0 0 0 9c0 1.45.35 2.82.96 4.04l2.92-2.26z"/><path fill="#fff" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.84-2.2c-.76.53-1.78.9-3.12.9-2.38 0-4.4-1.57-5.12-3.74L.97 13.04C2.45 15.98 5.48 18 9 18z"/></svg>
        Sign in with Google
      </button>
      <p id="auth-error" style="color:#ef4444; margin-top:16px; font-size:13px; display:none;"></p>
    </div>

    <!-- Logs View -->
    <div id="logs-view" style="display: none;">
      <div class="logs-header">
        <span>Activity Logs</span>
        <button id="sign-out-btn" class="tool-btn" style="font-size:12px; background: rgba(239,68,68,0.1); color: #ef4444; border-color: rgba(239,68,68,0.2);">Sign Out</button>
      </div>
      <div class="logs-container">
        <div class="logs-toolbar">
          <select id="user-filter">
            <option value="all">All Users</option>
          </select>
          <button id="refresh-logs-btn" class="tool-btn">↻ Refresh</button>
        </div>
        <div id="logs-list">
          <div class="loading-msg">Loading logs...</div>
        </div>
      </div>
    </div>

  </main>

  <script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      signInWithPopup,
      GoogleAuthProvider,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      getDatabase,
      ref,
      query,
      limitToLast,
      orderByChild,
      equalTo,
      onValue
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const ADMIN_UID = 'zEy6TO5ligf2um4rssIZs9C9X7f2';

    const firebaseConfig = {
      apiKey: "AIzaSyCHm6nxHzrIGHmWb1W_xDAYwnSoed6oTi4",
      authDomain: "fluxbynxtcoreee3.firebaseapp.com",
      projectId: "fluxbynxtcoreee3",
      storageBucket: "fluxbynxtcoreee3.firebasestorage.app",
      messagingSenderId: "1003023583985",
      appId: "1:1003023583985:web:58cec1087f433e2af97750",
      databaseURL: "https://fluxbynxtcoreee3-default-rtdb.europe-west1.firebasedatabase.app"
    };

    const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const rtdb = getDatabase(app);
    const googleProvider = new GoogleAuthProvider();

    const authView   = document.getElementById('auth-view');
    const logsView   = document.getElementById('logs-view');
    const signinBtn  = document.getElementById('google-signin-btn');
    const signoutBtn = document.getElementById('sign-out-btn');
    const authError  = document.getElementById('auth-error');
    const logsList   = document.getElementById('logs-list');
    const userFilter = document.getElementById('user-filter');
    const refreshBtn = document.getElementById('refresh-logs-btn');

    let _logsUnsub = null;

    signinBtn.addEventListener('click', async () => {
      signinBtn.disabled = true;
      signinBtn.textContent = 'Signing in...';
      authError.style.display = 'none';
      try {
        await signInWithPopup(auth, googleProvider);
      } catch (err) {
        authError.textContent = err.message;
        authError.style.display = 'block';
        signinBtn.disabled = false;
        signinBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 18 18"><path fill="#fff" d="M9 3.48c1.69 0 2.83.73 3.48 1.34l2.54-2.48C13.46.89 11.43 0 9 0 5.48 0 2.44 2.02.96 4.96l2.91 2.26C4.6 5.05 6.62 3.48 9 3.48z"/><path fill="#fff" d="M17.64 9.2c0-.74-.06-1.28-.19-1.84H9v3.34h4.96c-.1.83-.64 2.08-1.84 2.92l2.84 2.2c1.7-1.57 2.68-3.88 2.68-6.62z"/><path fill="#fff" d="M3.88 10.78A5.54 5.54 0 0 1 3.58 9c0-.62.11-1.22.29-1.78L.96 4.96A9 9 0 0 0 0 9c0 1.45.35 2.82.96 4.04l2.92-2.26z"/><path fill="#fff" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.84-2.2c-.76.53-1.78.9-3.12.9-2.38 0-4.4-1.57-5.12-3.74L.97 13.04C2.45 15.98 5.48 18 9 18z"/></svg> Sign in with Google`;
      }
    });

    signoutBtn.addEventListener('click', async () => {
      if (_logsUnsub) _logsUnsub();
      await signOut(auth);
    });

    onAuthStateChanged(auth, (user) => {
      if (user && !user.isAnonymous) {
        if (user.uid === ADMIN_UID) {
          authView.style.display = 'none';
          logsView.style.display = 'block';
          loadLogs();
        } else {
          window.location.href = 'denied.html';
        }
      } else {
        if (_logsUnsub) { _logsUnsub(); _logsUnsub = null; }
        authView.style.display = 'block';
        logsView.style.display = 'none';
      }
    });

    function loadLogs() {
      if (_logsUnsub) _logsUnsub();

      const filterUid = userFilter.value;
      let logsQuery;

      if (filterUid === 'all') {
        logsQuery = query(ref(rtdb, 'activityLogs'), limitToLast(100));
      } else {
        logsQuery = query(ref(rtdb, 'activityLogs'), orderByChild('uid'), equalTo(filterUid), limitToLast(100));
      }

      logsList.innerHTML = '<div class="loading-msg">Loading logs...</div>';

      _logsUnsub = onValue(logsQuery, (snap) => {
        logsList.innerHTML = '';
        if (!snap.exists()) {
          logsList.innerHTML = '<div class="loading-msg">No recent activity found.</div>';
          return;
        }

        const logs = [];
        snap.forEach(child => { logs.push(child.val()); });
        logs.reverse();

        const uniqueUsers = {};
        logs.forEach(l => { if (l.uid && l.username) uniqueUsers[l.uid] = l.username; });
        Object.entries(uniqueUsers).forEach(([uid, name]) => {
          if (!userFilter.querySelector(`option[value="${uid}"]`)) {
            const opt = document.createElement('option');
            opt.value = uid; opt.textContent = `@${name}`;
            userFilter.appendChild(opt);
          }
        });

        logs.forEach(l => {
          const item = document.createElement('div');
          item.className = 'log-item';
          const timeStr = l.timestamp ? new Date(l.timestamp).toLocaleString() : '';
          item.innerHTML = `
            <div><span class="log-user">@${l.username || 'unknown'}</span> <span class="log-action">${l.action || ''}</span></div>
            <div class="log-time">${timeStr}</div>
          `;
          logsList.appendChild(item);
        });
      }, (err) => {
        logsList.innerHTML = `<div class="loading-msg" style="color:#ef4444;">Failed to load logs: ${err.message}</div>`;
      });
    }

    userFilter.addEventListener('change', loadLogs);
    refreshBtn.addEventListener('click', loadLogs);
  </script>
</body>
</html>
