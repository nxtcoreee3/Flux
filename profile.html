<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Profile — Flux</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/thumbnail.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Flux">
  <meta name="theme-color" content="#0f1724">
  <style>
    /* ── Profile page ── */
    .profile-card {
      background: var(--panel);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      margin-bottom: 20px;
      overflow: hidden;
      position: relative;
    }

    /* Banner */
    .profile-banner {
      height: 120px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      overflow: hidden;
    }
    .profile-banner-confetti span {
      position: absolute;
      animation: banner-float 3s ease-in-out infinite;
      font-size: 20px;
      opacity: 0.7;
    }
    @keyframes banner-float {
      0%,100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(10deg); }
    }

    /* Avatar */
    .profile-avatar-ring {
      position: absolute;
      bottom: -44px;
      left: 28px;
      width: 88px; height: 88px;
      border-radius: 50%;
      padding: 3px;
      background: var(--panel);
      z-index: 2;
    }
    .profile-avatar, .profile-avatar-placeholder {
      width: 82px; height: 82px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }
    .profile-avatar-placeholder {
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 32px;
    }

    /* Body */
    .profile-body {
      padding: 52px 28px 24px;
    }
    .profile-name-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }
    .profile-displayname {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      color: var(--text);
      margin: 0;
      line-height: 1;
    }
    .profile-username { font-size: 13px; color: var(--muted); margin: 0 0 8px; }
    .profile-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .profile-bio { font-size: 14px; color: var(--muted); margin: 0 0 16px; line-height: 1.6; max-width: 480px; }

    .profile-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 20px; }

    .profile-stats {
      display: flex;
      gap: 0;
      border-top: 1px solid var(--glass-border);
      padding-top: 16px;
      flex-wrap: wrap;
    }
    .profile-stat {
      flex: 1;
      text-align: center;
      padding: 0 12px;
      border-right: 1px solid var(--glass-border);
      min-width: 70px;
    }
    .profile-stat:last-child { border-right: none; }
    .profile-stat-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: var(--text);
      display: block;
      line-height: 1;
    }
    .profile-stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

    /* Sections */
    .profile-section {
      background: var(--panel);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .profile-section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      color: var(--text);
      margin: 0 0 14px;
      display: flex; align-items: center; gap: 8px;
    }

    .mini-game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 10px;
    }
    .mini-game-card {
      border-radius: 10px;
      overflow: hidden;
      background: var(--bg);
      border: 1px solid var(--glass-border);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .mini-game-card:hover { transform: translateY(-3px); box-shadow: 0 10px 24px rgba(0,0,0,0.12); }
    .mini-game-card img { width: 100%; aspect-ratio: 16/10; object-fit: cover; display: block; }
    .mini-game-card-title { font-size: 11px; font-weight: 600; color: var(--text); padding: 6px 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .btn-follow {
      padding: 9px 22px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 20px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.15s;
    }
    .btn-follow:hover { opacity: 0.85; transform: scale(1.03); }
    .btn-follow.following {
      background: transparent;
      border: 1.5px solid var(--glass-border);
      color: var(--muted);
    }
    .btn-follow.following:hover { border-color: #ef4444; color: #ef4444; }

    .edit-profile-btn {
      padding: 9px 16px;
      background: transparent;
      border: 1.5px solid var(--glass-border);
      border-radius: 20px;
      font-size: 13px; font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .edit-profile-btn:hover { border-color: var(--accent); color: var(--accent); }

    .private-notice { text-align: center; padding: 40px 20px; color: var(--muted); }
    .private-notice .lock-icon { font-size: 40px; margin-bottom: 12px; display: block; }

    .profile-loading { text-align: center; padding: 80px 20px; color: var(--muted); font-size: 14px; }

    .not-found { text-align: center; padding: 80px 20px; }
    .not-found h2 { font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: var(--text); margin: 0 0 8px; }
    .not-found p { color: var(--muted); font-size: 14px; }

    .ban-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: #ef4444; color: white;
      font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 20px;
    }

    /* Edit modal */
    .edit-modal-overlay {
      position: fixed; inset: 0; z-index: 600;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(6px);
    }
    .edit-modal-box {
      background: var(--panel);
      border-radius: 20px; padding: 28px;
      width: 100%; max-width: 420px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.2);
      position: relative; max-height: 90vh; overflow-y: auto;
    }
    .input-field {
      width: 100%; padding: 10px 12px;
      border: 1px solid var(--glass-border);
      border-radius: 10px; font-size: 14px;
      background: var(--bg); color: var(--text);
      outline: none; box-sizing: border-box; font-family: inherit;
    }
    .input-field:focus { border-color: var(--accent); }
    .field-label {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.5px;
      display: block; margin-bottom: 4px;
    }

    /* Admin panel */
    .ban-panel {
      background: rgba(239,68,68,0.06);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 12px; padding: 16px; margin-top: 16px;
    }
    .ban-panel-title { font-size: 12px; font-weight: 700; color: #ef4444; margin: 0 0 10px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Beta badge */
    .beta-badge {
      display: inline-flex; align-items: center;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      color: white; font-size: 9px; font-weight: 800;
      padding: 2px 7px; border-radius: 20px;
      letter-spacing: 0.8px; text-transform: uppercase;
      position: relative; vertical-align: middle;
    }
    .beta-badge::before {
      content: ''; position: absolute; inset: -2px; border-radius: 20px;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      opacity: 0.4; animation: beta-pulse 2s ease-in-out infinite; z-index: -1;
    }
    @keyframes beta-pulse { 0%,100%{transform:scale(1);opacity:0.4} 50%{transform:scale(1.3);opacity:0} }
    .beta-nav { display: inline-flex; align-items: center; gap: 5px; }

    @media (max-width: 600px) {
      .profile-banner { height: 90px; font-size: 36px; }
      .profile-body { padding: 48px 16px 20px; }
      .profile-displayname { font-size: 28px; }
      .mini-game-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); }
    }
  </style>
</head>
