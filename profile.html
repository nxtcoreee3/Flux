<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Profile — Flux</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#0f1724">
  <style>
    /* ── Profile page specific styles ── */
    .profile-hero {
      background: var(--panel);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 32px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }
    .profile-hero::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
      opacity: 0.12;
      border-radius: 20px 20px 0 0;
    }
    .profile-top {
      display: flex;
      align-items: flex-end;
      gap: 20px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .profile-avatar-wrap {
      position: relative;
      flex-shrink: 0;
    }
    .profile-avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--bg);
      display: block;
    }
    .profile-avatar-placeholder {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 32px;
      border: 3px solid var(--bg);
      flex-shrink: 0;
    }
    .profile-info { flex: 1; min-width: 0; }
    .profile-displayname {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      color: var(--text);
      margin: 0 0 4px;
      line-height: 1;
    }
    .profile-username {
      font-size: 14px;
      color: var(--muted);
      margin: 0 0 8px;
    }
    .profile-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .profile-bio {
      font-size: 14px;
      color: var(--muted);
      margin: 0;
      line-height: 1.5;
    }
    .profile-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; align-items: center; }
    .profile-stats {
      display: flex;
      gap: 24px;
      padding: 16px 0 0;
      border-top: 1px solid var(--glass-border);
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .profile-stat { text-align: center; }
    .profile-stat-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      color: var(--text);
      display: block;
    }
    .profile-stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

    .profile-section {
      background: var(--panel);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .profile-section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      color: var(--text);
      margin: 0 0 16px;
      display: flex; align-items: center; gap: 8px;
    }

    .mini-game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 12px;
    }
    .mini-game-card {
      border-radius: 12px;
      overflow: hidden;
      background: var(--bg);
      border: 1px solid var(--glass-border);
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: pointer;
    }
    .mini-game-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
    .mini-game-card img { width: 100%; aspect-ratio: 16/10; object-fit: cover; display: block; }
    .mini-game-card-title { font-size: 11px; font-weight: 600; color: var(--text); padding: 6px 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .btn-follow {
      padding: 8px 20px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 20px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-follow:hover { opacity: 0.85; }
    .btn-follow.following {
      background: transparent;
      border: 1px solid var(--glass-border);
      color: var(--muted);
    }
    .btn-follow.following:hover { border-color: #ef4444; color: #ef4444; }

    .private-notice {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }
    .private-notice .lock-icon { font-size: 40px; margin-bottom: 12px; display: block; }

    .profile-loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 14px;
    }

    .not-found {
      text-align: center;
      padding: 80px 20px;
    }
    .not-found h2 { font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: var(--text); margin: 0 0 8px; }
    .not-found p { color: var(--muted); font-size: 14px; }

    /* Beta badge */
    .beta-badge {
      display: inline-flex;
      align-items: center;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      color: white;
      font-size: 9px;
      font-weight: 800;
      padding: 2px 7px;
      border-radius: 20px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      position: relative;
      vertical-align: middle;
    }
    .beta-badge::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 20px;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      opacity: 0.4;
      animation: beta-pulse 2s ease-in-out infinite;
      z-index: -1;
    }
    @keyframes beta-pulse {
      0%, 100% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.3); opacity: 0; }
    }
    .beta-nav { display: inline-flex; align-items: center; gap: 5px; }

    .ban-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: #ef4444; color: white;
      font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 20px;
    }

    .edit-profile-btn {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .edit-profile-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Edit modal */
    .edit-modal-overlay {
      position: fixed; inset: 0; z-index: 600;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(6px);
    }
    .edit-modal-box {
      background: var(--panel);
      border-radius: 20px;
      padding: 28px;
      width: 100%; max-width: 400px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.2);
      position: relative;
      max-height: 90vh;
      overflow-y: auto;
    }
    .input-field {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      box-sizing: border-box;
      font-family: inherit;
    }
    .input-field:focus { border-color: var(--accent); }
    .field-label {
      font-size: 11px; font-weight: 700;
      color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.5px;
      display: block; margin-bottom: 4px;
    }

    /* Admin ban panel */
    .ban-panel {
      background: rgba(239,68,68,0.06);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 12px;
      padding: 16px;
      margin-top: 16px;
    }
    .ban-panel-title { font-size: 12px; font-weight: 700; color: #ef4444; margin: 0 0 10px; text-transform: uppercase; letter-spacing: 0.5px; }

    @media (max-width: 600px) {
      .profile-hero { padding: 20px; }
      .profile-displayname { font-size: 24px; }
      .mini-game-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <a href="index.html" class="logo">FLUX</a>

    </div>
    <nav class="nav">
      <button class="nav-toggle" aria-controls="main-nav" aria-expanded="false">☰</button>
      <ul id="main-nav" class="nav-list">
        <li><a href="index.html">Home</a></li>
        <li><a href="games.html">Games</a></li>
        <li><a href="social.html"><span class="beta-nav">Social <span class="beta-badge">Beta</span></span></a></li>
        <li><a href="info.html">Info</a></li>
        <li><a href="credits.html">Credits</a></li>
        <li><a href="donate.html" class="accent">Donate</a></li>

  <main style="max-width:720px;margin:0 auto;padding:24px 16px;">

  <footer class="site-footer">

      <div class="footer-links">

  <script type="module" src="profile.js"></script>
</body>
</html>
