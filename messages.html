<!doctype html>
<html lang="en">
<head>
  <script>
    // Apply dark/beta instantly before first paint to prevent flash
    (function() {
      try {
        if (localStorage.getItem('flux_dark') === '1' || 
            (localStorage.getItem('flux_dark') === null && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
        if (localStorage.getItem('flux_beta') === '1') {
          document.documentElement.classList.add('beta');
        }
      } catch(e) {}
    })();
  </script>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Messages — Flux</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/thumbnail.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Flux">
  <meta name="theme-color" content="#0f1724">
  <style>
    #messages-root {
      display: flex;
      max-width: 1000px;
      margin: 24px auto;
      padding: 0 16px;
      gap: 0;
      height: calc(100svh - 140px);
      min-height: 400px;
    }

    /* Sidebar */
    .convo-sidebar {
      width: 300px;
      flex-shrink: 0;
      background: var(--panel);
      border: 1px solid var(--glass-border);
      border-radius: 20px 0 0 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .convo-sidebar-header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--glass-border);
      flex-shrink: 0;
    }
    .convo-sidebar-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      color: var(--text);
      margin: 0 0 10px;
    }
    .tab-btn { transition: background 0.15s, color 0.15s; }
    .tab-active { background: var(--panel) !important; color: var(--text) !important; }
    .convo-sidebar-actions {
      display: flex;
      gap: 8px;
    }
    .sidebar-action-btn {
      flex: 1;
      padding: 8px;
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: border-color 0.15s;
      text-align: center;
    }
    .sidebar-action-btn:hover { border-color: var(--accent); color: var(--accent); }
    #convo-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .convo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .convo-item:hover { background: var(--bg); }
    .convo-item.active { background: rgba(58,125,255,0.1); }

    /* Chat panel */
    #chat-panel {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--glass-border);
      border-left: none;
      border-radius: 0 20px 20px 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-header-bar {
      padding: 14px 16px;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .back-btn {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: var(--muted);
      padding: 0;
      line-height: 1;
    }
    .back-btn:hover { color: var(--text); }
    .messages-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .messages-list::-webkit-scrollbar { width: 4px; }
    .messages-list::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 2px; }

    .message-row { display: flex; flex-direction: column; max-width: 72%; }
    .message-row.own { align-self: flex-end; align-items: flex-end; }
    .message-row.other { align-self: flex-start; align-items: flex-start; }

    .message-bubble {
      display: inline-block;
      text-align: left;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      overflow-wrap: break-word;
      max-width: 100%;
    }
    .bubble-own {
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .bubble-other {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--glass-border);
      border-bottom-left-radius: 4px;
    }

    .message-input-bar {
      padding: 12px 16px;
      border-top: 1px solid var(--glass-border);
      display: flex;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
    }
    .msg-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .msg-input:focus { border-color: var(--accent); }
    .msg-send-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: white;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    .msg-send-btn:hover { opacity: 0.85; }

    /* Typing indicator (3 bouncing dots) */
    .flux-typing-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      margin: 0 0 6px 0;
      max-width: 72%;
    }
    .flux-typing-bubble {
      padding: 10px 14px;
      border-radius: 18px;
      background: var(--bg);
      border: 1px solid var(--glass-border);
      border-bottom-left-radius: 4px;
      display: inline-flex;
      align-items: center;
    }
    .flux-typing-dots {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      height: 12px;
    }
    .flux-typing-dots i {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: rgba(107, 114, 128, 0.9);
      transform: translateY(0);
      animation: fluxTypingBounce 1.05s infinite ease-in-out;
    }
    .flux-typing-dots i:nth-child(2) { animation-delay: 0.15s; opacity: 0.9; }
    .flux-typing-dots i:nth-child(3) { animation-delay: 0.30s; opacity: 0.85; }
    @keyframes fluxTypingBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.55; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    /* Mention pop (when you get pinged) */
    .flux-mention-pop {
      animation: fluxMentionPop 420ms cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center bottom;
    }
    @keyframes fluxMentionPop {
      0% { transform: scale(1); }
      40% { transform: scale(1.08); }
      70% { transform: scale(0.98); }
      100% { transform: scale(1); }
    }

    /* Mention picker */
    #mention-menu {
      position: fixed;
      z-index: 99999;
      display: none;
      width: 320px;
      max-height: 260px;
      overflow: auto;
      background: var(--panel);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      box-shadow: 0 18px 55px rgba(0,0,0,0.18);
      padding: 6px;
    }
    .mention-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.1s;
      user-select: none;
    }
    .mention-item:hover, .mention-item.active { background: var(--bg); }
    .mention-avatar {
      width: 30px;
      height: 30px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
      border: 1px solid rgba(0,0,0,0.06);
    }
    .mention-placeholder {
      width: 30px;
      height: 30px;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-weight: 900;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .mention-name { font-size: 13px; font-weight: 900; color: var(--text); line-height: 1.2; }
    .mention-username { font-size: 11px; color: var(--muted); font-weight: 800; margin-top: 2px; }

    /* Mentions inside message bubbles */
    .flux-mention-link {
      font-weight: 900;
      text-decoration: none;
      white-space: nowrap;
    }
    .bubble-other .flux-mention-link {
      color: var(--accent);
    }
    .bubble-own .flux-mention-link {
      color: #ffffff;
    }

    @media (max-width: 768px) {
      #messages-root {
        height: calc(100svh - 120px);
        padding: 0;
        margin: 0;
        flex-direction: column;
        border-radius: 0;
      }
      .convo-sidebar {
        width: 100%;
        height: 260px;
        min-height: 260px;
        border-radius: 0;
        border: none;
        border-bottom: 1px solid var(--glass-border);
      }
      #chat-panel {
        border-radius: 0;
        border: none;
        flex: 1;
        min-height: 0;
      }
    }
  </style>
  <style>
    @media (max-width: 768px) {
      #main-nav { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; flex-wrap: nowrap !important; }
      #main-nav::-webkit-scrollbar { display: none; }
    }
  </style>
</head>
<body>
  <div id="global-page-loader" style="position:fixed;inset:0;background:#ffffff;z-index:9999999;display:flex;justify-content:center;align-items:center;transition:opacity 0.4s ease;pointer-events:none;">
    <img src="assets/loading.gif" style="width:250px;height:auto;" alt="Loading...">
  </div>
  <script>
    // Fast Boot: hide the white loader quickly (best effort)
    (function(){
      const hide = () => {
        try { if (localStorage.getItem('flux_fast_boot') !== '1') return; } catch(e){ return; }
        const el = document.getElementById('global-page-loader');
        if (!el) return;
        el.style.opacity = '0';
        setTimeout(() => { try { el.remove(); } catch(e){} }, 420);
      };
      setTimeout(hide, 80);
      requestAnimationFrame(hide);
      window.addEventListener('pageshow', hide, { once: true });
    })();
  </script>

  <header class="topbar">
    <div class="brand">
      <a href="index.html" class="logo"><img src="assets/logo.png" alt="Flux" style="height:32px;vertical-align:middle;margin-right:6px;"> FLUX</a>
    </div>
    <nav class="nav">
      <button class="nav-toggle" aria-controls="main-nav" aria-expanded="false">☰</button>
      <ul id="main-nav" class="nav-list">
        <li><a href="index.html">Home</a></li>
        <li><a href="games.html">Games</a></li>
        <li><a href="social.html">Social</a></li>
        <li><a href="messages.html" class="active">Messages</a></li>
        <li><a href="info.html">Info</a></li>
        <li><a href="credits.html">Credits</a></li>
        <li><a href="donate.html" class="accent">Donate</a></li>
      </ul>
    </nav>
    <div class="right-actions">
      <a class="icon-btn" href="https://github.com/nxtcoreee3/flux" target="_blank" rel="noopener">⭐ Star</a>
    </div>
  </header>

  <div id="messages-root" style="display:none;">
    <!-- Sidebar -->
    <div class="convo-sidebar">
      <div class="convo-sidebar-header">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
          <div class="convo-sidebar-title" style="margin:0;">💬 Messages</div>
          <span style="display:inline-flex;align-items:center;background:linear-gradient(135deg,#f59e0b,#ef4444);color:white;font-size:9px;font-weight:800;padding:2px 7px;border-radius:20px;letter-spacing:0.8px;text-transform:uppercase;">Beta</span>
        </div>
        <div style="display:flex;gap:2px;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:10px;">
          <button id="tab-inbox" class="tab-btn tab-active" style="flex:1;padding:6px 8px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;background:var(--panel);color:var(--text);">Inbox</button>
          <button id="tab-requests" class="tab-btn" style="flex:1;padding:6px 8px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;background:transparent;color:var(--muted);display:flex;align-items:center;justify-content:center;gap:5px;">
            Requests <span id="requests-badge" style="display:none;background:#ef4444;color:white;font-size:10px;font-weight:800;padding:1px 5px;border-radius:20px;">0</span>
          </button>
        </div>
        <div class="convo-sidebar-actions">
          <button id="new-dm-btn" class="sidebar-action-btn">✉️ New DM</button>
          <button id="new-group-btn" class="sidebar-action-btn">👥 Group</button>
        </div>
      </div>
      <div id="convo-list"></div>
    </div>

    <!-- Chat panel -->
    <div id="chat-panel">
      <div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:14px;flex-direction:column;gap:12px;">
        <span style="font-size:40px;">💬</span>
        <span>Select a conversation or start a new one</span>
      </div>
    </div>
  </div>

  <div id="messages-auth-required"></div>

  <footer class="site-footer" style="margin-top:0;">
    <div class="footer-inner">
      <div class="footer-brand">
        <a href="index.html" class="logo-small">FLUX</a>
        <p>Built by <a href="https://github.com/nxtcoreee3" target="_blank" rel="noopener">nxtcoreee3</a></p>
      </div>
    </div>
    <small class="copyright">Flux © <span id="year"></span></small>
  </footer>

  <script type="module" src="messages.js"></script>

<script>
  window.addEventListener('load', () => {
    setTimeout(() => { const loader = document.getElementById('global-page-loader'); if(loader) { loader.style.opacity = '0'; setTimeout(() => loader.remove(), 400); } }, 400);
  });
</script>
</body>
</html>
