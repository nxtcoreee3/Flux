<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Access Denied - Flux</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script>
    (function() {
      try {
        if (localStorage.getItem('flux_dark') === '1' ||
            (localStorage.getItem('flux_dark') === null && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
        if (localStorage.getItem('flux_beta') === '1') document.documentElement.classList.add('beta');
      } catch(e) {}
    })();
  </script>
  <style>
    .denied-page {
      max-width: 600px;
      margin: 100px auto;
      padding: 40px;
      text-align: center;
      background: var(--panel);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .denied-icon {
      font-size: 64px;
      margin-bottom: 20px;
      display: block;
    }
    .denied-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      color: #ef4444;
      margin: 0 0 10px;
      letter-spacing: 1px;
    }
    .denied-text {
      font-size: 16px;
      color: var(--muted);
      line-height: 1.6;
      margin: 0 0 24px;
    }
    .redirect-text {
      font-size: 13px;
      color: var(--text);
      font-weight: 700;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="denied-page">
    <span class="denied-icon">⛔</span>
    <h1 class="denied-title">ACCESS DENIED</h1>
    <p class="denied-text">You do not have the required administrator privileges to view this page. If you believe this is an error, please contact the site owner.</p>
    <p class="redirect-text">Redirecting you to the home page in <span id="countdown">5</span> seconds...</p>
  </div>

  <script>
    let timeLeft = 5;
    const countdownEl = document.getElementById('countdown');
    const timer = setInterval(() => {
      timeLeft--;
      countdownEl.textContent = timeLeft;
      if (timeLeft <= 0) {
        clearInterval(timer);
        window.location.href = 'index.html';
      }
    }, 1000);
  </script>
</body>
</html>
